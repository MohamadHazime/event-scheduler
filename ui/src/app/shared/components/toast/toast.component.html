<div class="fixed top-4 right-4 z-[100] space-y-2 max-w-sm w-full">
  @for (toast of toastService.toasts(); track toast.id) {
    <div class="flex items-start gap-3 p-4 rounded-lg border-l-4 shadow-lg animate-slide-in {{ getClasses(toast.type) }}">
      <span class="text-lg font-bold shrink-0">{{ getIcon(toast.type) }}</span>
      <p class="text-sm flex-1">{{ toast.message }}</p>
      <button (click)="toastService.dismiss(toast.id)" class="shrink-0 opacity-60 hover:opacity-100 text-lg leading-none">
        &times;
      </button>
    </div>
  }
</div>
